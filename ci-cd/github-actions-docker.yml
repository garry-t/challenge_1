# Copy this file to: .github/workflows/docker-build-push.yml
#
# Builds ci-cd/Dockerfile: Alpine base with hardening practices (non-root + dumb-init); not a vendor hardened minimal image.
# Swap the base image for Chainguard or distroless when your binary supports it (see Dockerfile comments).
# Pull requests from forks cannot use repository secrets; use same-repo branches for full CI.
#
# Required GitHub Secrets (Harbor path):
#   REGISTRY_HOST          e.g. harbor.example.com  (no scheme, no trailing slash)
#   REGISTRY_PROJECT       e.g. ninox                (Harbor project name)
#   HARBOR_ROBOT_USERNAME  Harbor robot account name
#   HARBOR_ROBOT_TOKEN     Harbor robot secret
#
# For AWS ECR instead of Harbor: remove the Harbor login step and use:
#   - aws-actions/configure-aws-credentials@v4  (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION)
#   - aws-actions/amazon-ecr-login@v2
#   Then set images: to ${{ steps.ecr.outputs.registry }}/<repo>/${{ env.IMAGE_NAME }}

name: Docker — build, scan, push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: leveldb-app

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Build and load (pull_request — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./ci-cd
          file: ./ci-cd/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (PR)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:ci
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Build and push (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./ci-cd
          file: ./ci-cd/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
